<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love</title>
<!-- <link rel="stylesheet" href="birthday.css"> -->
</head>
<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
overflow:hidden;
background-color: black;
}

/* center container */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* button */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:red;
color:black;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* hearts */

.heart{
position:absolute;
color:red;
animation:float 8s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}

}

/* fade animation */

.fade{
animation:fadeIn 2s;
}

@keyframes fadeIn{

from{opacity:0}
to{opacity:1}

}

/* images */

img{
width:200px;
border-radius:20px;
margin:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

 /* .fa{
font-size:5px;
transition: 0.3s; 
} */

.fa:hover{
font-size:18px;
color: gold;
}  



@media (max-width:1024px){

.container{
top:45%;
}

img{
width:170px;
}

button{
font-size:16px;
padding:12px 26px;
}

/* .fa{
font-size:8px;
}

.fa:hover{
font-size:16px;
} */

}



@media (max-width:768px){

.container{
top:50%;
width:90%;
}

img{
width:140px;
}

button{
font-size:15px;
padding:10px 22px;
}

/* .fa{
font-size:10px;
}

.fa:hover{
font-size:14px;
} */

}



@media (max-width:480px){

.container{
top:50%;
width:95%;
}

img{
width:110px;
}

button{
font-size:14px;
padding:8px 18px;
}

/* .fa{
font-size:12px;
}

.fa:hover{
font-size:16px;
} */

}

</style>

<body>

<div class="container fade" id="main">

<h1 id="typing"></h1>

<p>You are about to see something special ❤️</p>

<button onclick="nextPage()">Open Surprise</button>

</div>

<script>

/* typing animation */

let text="Hey My Beautiful Love ❤️";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,80);

}

}

typing();


/* hearts generator */

setInterval(()=>{

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},8000);

},200);


/* next page */

function nextPage(){

document.getElementById("main").innerHTML=`

<h1 class="fade">Our Beautiful Memories 📸</h1>

<p class="fade">Every moment with you is my favorite memory.</p>

<img src="WhatsApp Image 2026-04-12 at 12.19.01 PM (1).jpeg">

<img src="WhatsApp Image 2026-04-12 at 12.19.01 PM (2).jpeg">


<br><br>

<button onclick="finalPage()">Next</button>

`;

}

/* final message */

function finalPage(){

document.getElementById("main").innerHTML=`


<h1 class="fade">Happy Birthday My Love 🎂❤️</h1>

<p class="fa">

From the moment you came into my life,<br><br>

everything became more beautiful.<br><br>

Your smile brightens my darkest days,<br><br>

and your love makes my life complete.<br><br>

I’m truly lucky to have you.<br><br>

On this special day, I wish you endless happiness,<br><br>

love, success, and beautiful moments.<br><br>

Once again... Happy Birthday to the most special person in my life ❤️

</p>


`;

}

</script>

</body>
</html>
